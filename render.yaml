services:
  - type: web
    name: voga-ind-balance-api
    runtime: node
    plan: starter
    buildCommand: pnpm install --frozen-lockfile && pnpm api:build
    startCommand: pnpm api:start
    envVars:
      - key: NODE_ENV
        value: production
      - key: CORS_ORIGIN
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
